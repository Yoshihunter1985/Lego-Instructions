<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Brick Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  @font-face{
    font-family:'LegoTitle';
    src:url('https://raw.githubusercontent.com/Yoshihunter1985/Lego-Instructions/main/LEGO.ttf') format('truetype');
    font-display:swap;
  }
  @font-face{
    font-family:'LegoThick';
    src:url('https://raw.githubusercontent.com/Yoshihunter1985/Lego-Instructions/main/Legothick.ttf') format('truetype');
    font-display:swap;
  }
  :root{
    --bg:#F4EFE2;
    --bg-deep:#E7DFC9;
    --ink:#23211B;
    --ink-soft:#5C584C;
    --card:#FFFCF4;
    --line:#D8CFB4;
    --red:#D6321D;
    --yellow:#F4B400;
    --blue:#1768AC;
    --green:#1C8A5A;
    --shadow: 0 6px 0 rgba(35,33,27,0.16);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background-color:var(--bg);
    background-image: url('https://raw.githubusercontent.com/Yoshihunter1985/Lego-Instructions/main/Lego%20dull%20background.png');
    background-size: 480px;
    background-repeat: repeat;
    background-attachment: fixed;
    color:var(--ink);
    font-family:'Nunito',sans-serif;
    min-height:100vh;
    -webkit-tap-highlight-color: transparent;
  }
  .wrap{max-width:920px;margin:0 auto;padding:22px 18px 60px;}

  header.top{
    display:flex;align-items:center;gap:14px;
    margin-bottom:22px;
    background:rgba(244,239,226,0.9);
    backdrop-filter: blur(4px);
    border-radius:16px;
    padding:14px 18px;
    box-shadow: var(--shadow);
  }
  .lego-badge{
    font-family:'LegoTitle',sans-serif;
    font-weight:700;
    font-size:26px;
    letter-spacing:0.5px;
    color:#fff;
    background:var(--red);
    border:4px solid var(--yellow);
    border-radius:8px;
    padding:6px 16px 8px;
    line-height:1;
    -webkit-text-stroke: 1.5px #1a1108;
    text-shadow:
      2px 0 0 #1a1108, -2px 0 0 #1a1108,
      0 2px 0 #1a1108, 0 -2px 0 #1a1108,
      2px 2px 0 #1a1108, -2px -2px 0 #1a1108,
      2px -2px 0 #1a1108, -2px 2px 0 #1a1108;
    box-shadow: var(--shadow);
    display:inline-block;
  }
  .brand-sub{
    font-family:'Nunito';font-weight:800;font-size:12px;color:var(--ink-soft);
    letter-spacing:1.5px;text-transform:uppercase;
  }

  .crumb{
    display:flex;align-items:center;gap:10px;margin-bottom:18px;
    background:rgba(244,239,226,0.9);
    backdrop-filter: blur(4px);
    border-radius:14px;
    padding:10px 14px;
  }
  .back-btn{
    font-family:'LegoTitle',sans-serif;font-weight:700;font-size:15px;
    background:var(--card);border:2px solid var(--line);border-radius:10px;
    padding:8px 14px 8px 10px;cursor:pointer;color:var(--ink);
    box-shadow: 0 4px 0 var(--line);
    display:flex;align-items:center;gap:6px;
  }
  .back-btn:active{transform:translateY(3px);box-shadow:none;}
  .crumb-label{font-family:'LegoTitle',sans-serif;font-weight:700;font-size:20px;color:var(--ink);}

  /* Category grid: rendered as brick tiles */
  .brick-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
    gap:22px 18px;
  }
  .brick{
    appearance:none;border:none;cursor:pointer;text-align:left;
    background:var(--brick-color);
    border-radius:10px;
    padding:16px 16px;
    position:relative;
    min-height:108px;
    box-shadow: var(--shadow);
    transition: transform .08s ease, box-shadow .08s ease;
    color:#fff;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
  }
  .brick:active{transform:translateY(5px);box-shadow:0 1px 0 rgba(35,33,27,0.16);}
  .brick.has-logo .theme-count{position:relative;z-index:1;}
  .brick .theme-name{
    font-family:'LegoTitle',sans-serif;font-weight:700;font-size:23px;
    line-height:1.15;
    display:block;
    margin-bottom:6px;
    text-shadow: 0 2px 3px rgba(0,0,0,0.45);
  }
  .brick .theme-count{
    font-family:'Nunito';font-weight:800;font-size:12.5px;
    opacity:.92; letter-spacing:.4px; text-transform:uppercase;
    background:rgba(255,255,255,0.22);
    display:inline-block;padding:3px 9px;border-radius:20px;
  }

  /* Set grid */
  .brick.has-logo{
    background-size: cover;
    background-position: center;
    background-color: var(--brick-color);
  }
  .brick.has-logo::after{
    content:'';position:absolute;inset:0;border-radius:10px;
    background:linear-gradient(180deg, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.55) 100%);
  }
  .brick.has-logo .theme-count{position:relative;z-index:1;}

  .set-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(168px,1fr));
    gap:20px;
  }
  .set-card{
    background:var(--card);
    border:2px solid var(--line);
    border-radius:14px;
    overflow:hidden;
    cursor:pointer;
    box-shadow: 0 5px 0 var(--line);
    transition: transform .08s ease, box-shadow .08s ease;
  }
  .set-card:active{transform:translateY(4px);box-shadow:0 1px 0 var(--line);}
  .set-thumb{
    aspect-ratio:1/1;
    background:var(--bg-deep);
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
    position:relative;
  }
  .set-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .set-thumb .pdf-pill{
    position:absolute;bottom:7px;right:7px;
    background:var(--red);color:#fff;
    font-family:'LegoTitle';font-weight:700;font-size:11px;
    padding:3px 8px;border-radius:8px;
    letter-spacing:.5px;
  }
  .set-info{padding:10px 12px 13px;}
  .set-number{
    font-family:'Nunito';font-weight:900;font-size:11.5px;color:var(--ink-soft);
    letter-spacing:.6px;
  }
  .set-name{
    font-family:'LegoTitle',sans-serif;font-weight:600;font-size:16px;
    margin-top:2px;line-height:1.2;
    color:#000;
  }

  .state-msg{
    font-family:'LegoTitle',sans-serif;font-weight:600;font-size:17px;
    color:var(--ink-soft);
    text-align:center;padding:50px 20px;
    background:rgba(244,239,226,0.9);
    backdrop-filter: blur(4px);
    border-radius:16px;
  }
  .pdf-viewer-wrap{
    background:rgba(244,239,226,0.95);
    border-radius:16px;
    padding:10px;
    box-shadow: var(--shadow);
  }
  .pdf-viewer-wrap iframe{
    width:100%;
    height:calc(100vh - 220px);
    min-height:480px;
    border:none;
    border-radius:10px;
    background:#fff;
    display:block;
  }
  .pdf-fallback{
    text-align:center;margin-top:10px;
  }
  .pdf-fallback a{
    font-family:'LegoTitle',sans-serif;font-weight:600;font-size:14px;
    color:var(--blue);text-decoration:none;
  }
  .state-msg .big{font-size:40px;display:block;margin-bottom:10px;}

  .pulse{animation:pulse 1.1s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}

  @media (prefers-reduced-motion: reduce){ .pulse{animation:none;} }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <span class="lego-badge">Brick Vault</span>
    <span class="brand-sub" id="ownerLabel">Lego instructions</span>
  </header>

  <div id="crumb" class="crumb" style="display:none;">
    <button class="back-btn" id="backBtn">&larr; Themes</button>
    <span class="crumb-label" id="crumbLabel"></span>
  </div>

  <div id="content"></div>
</div>

<script>
/* ---------- CONFIG ---------- */
const GH_USER = "Yoshihunter1985";
const GH_REPO = "Lego-Instructions";
const GH_BRANCH = "main";

const API_ROOT = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents`;
const RAW_ROOT = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/${GH_BRANCH}`;

const BRICK_COLORS = ["#D6321D","#1768AC","#1C8A5A","#F4B400","#8E44AD","#E07B1A"];
function colorFor(name){
  let h = 0;
  for(const ch of name) h = (h*31 + ch.charCodeAt(0)) >>> 0;
  return BRICK_COLORS[h % BRICK_COLORS.length];
}

const content = document.getElementById('content');
const crumb = document.getElementById('crumb');
const crumbLabel = document.getElementById('crumbLabel');
document.getElementById('backBtn').onclick = () => {
  if(location.hash.startsWith('#/view/')){
    const folderEncoded = location.hash.slice('#/view/'.length).split('/')[0];
    location.hash = `#/${folderEncoded}`;
  } else {
    location.hash = '';
  }
};

function loadingState(label){
  content.innerHTML = `<div class="state-msg pulse"><span class="big">&#129683;</span>${label}</div>`;
}
function errorState(label){
  content.innerHTML = `<div class="state-msg"><span class="big">&#9888;&#65039;</span>${label}</div>`;
}

async function ghList(path=""){
  const res = await fetch(`${API_ROOT}/${path}`);
  if(!res.ok) throw new Error(`GitHub API error ${res.status}`);
  return res.json();
}

/* Parse a folder's files into sets, pairing "NUM - Name pic.jpg" with "NUM - Name.pdf" */
function buildSets(files, folderPath){
  const map = {};
  for(const f of files){
    if(f.type !== 'file') continue;
    if(/logo/i.test(f.name)) continue;
    const m = f.name.match(/^(.+?)\.(jpg|jpeg|png|webp|pdf)$/i);
    if(!m) continue;
    let stem = m[1].trim();
    const ext = m[2].toLowerCase();
    const isImage = ext !== 'pdf';
    if(isImage) stem = stem.replace(/\s*pic\s*$/i,'').trim();

    const numMatch = stem.match(/^(\d+)\s*-\s*(.+)$/);
    const number = numMatch ? numMatch[1] : '';
    const name = numMatch ? numMatch[2].trim() : stem;
    const key = number ? number : stem;

    if(!map[key]) map[key] = { number, name, image:null, pdf:null };
    if(isImage && !map[key].image) map[key].image = `${RAW_ROOT}/${folderPath}/${encodeURIComponent(f.name)}`;
    if(ext === 'pdf') map[key].pdf = `${RAW_ROOT}/${folderPath}/${encodeURIComponent(f.name)}`;
  }
  return Object.values(map).sort((a,b)=> (a.number||'').localeCompare(b.number||'', undefined, {numeric:true}));
}

async function renderHome(){
  crumb.style.display = 'none';
  loadingState('Tipping out the brick bin&hellip;');
  try{
    const items = await ghList();
    const folders = items.filter(i => i.type === 'dir');
    if(folders.length === 0){
      errorState('No theme folders yet. Add one to the repo to get started.');
      return;
    }
    const counts = await Promise.all(folders.map(f => ghList(encodeURIComponent(f.name)).catch(()=>[])));

    content.innerHTML = `<div class="brick-grid">${
      folders.map((f,i) => {
        const fileCount = counts[i].filter(x=>x.type==='file' && /\.(pdf)$/i.test(x.name)).length;
        const logoFile = counts[i].find(x => x.type==='file' && /logo/i.test(x.name) && /\.(jpg|jpeg|png|webp)$/i.test(x.name));
        const logoUrl = logoFile ? `${RAW_ROOT}/${encodeURIComponent(f.name)}/${encodeURIComponent(logoFile.name)}` : null;
        const styleAttr = logoUrl
          ? `--brick-color:${colorFor(f.name)};background-image:url('${logoUrl}')`
          : `--brick-color:${colorFor(f.name)}`;
        return `
        <button class="brick${logoUrl ? ' has-logo' : ''}" style="${styleAttr}" data-folder="${encodeURIComponent(f.name)}">
          ${logoUrl ? '' : `<span class="theme-name">${f.name}</span>`}
          <span class="theme-count">${fileCount} set${fileCount===1?'':'s'}</span>
        </button>`;
      }).join('')
    }</div>`;

    content.querySelectorAll('.brick').forEach(btn=>{
      btn.onclick = () => { location.hash = `#/${btn.dataset.folder}`; };
    });
  }catch(e){
    errorState("Couldn't reach the brick bin. Check your connection and try again.");
  }
}

async function renderCategory(folderEncoded){
  const folderName = decodeURIComponent(folderEncoded);
  crumb.style.display = 'flex';
  crumbLabel.textContent = folderName;
  loadingState(`Sorting the ${folderName} sets&hellip;`);
  try{
    const files = await ghList(folderEncoded);
    const sets = buildSets(files, folderEncoded);
    if(sets.length === 0){
      errorState('No sets found in this theme yet.');
      return;
    }
    content.innerHTML = `<div class="set-grid">${
      sets.map(s => `
        <div class="set-card" data-pdf="${s.pdf ? s.pdf : ''}">
          <div class="set-thumb">
            ${s.image ? `<img src="${s.image}" alt="${s.name}" loading="lazy">` : ''}
            ${s.pdf ? `<span class="pdf-pill">PDF</span>` : ''}
          </div>
          <div class="set-info">
            <div class="set-number">${s.number ? '#'+s.number : ''}</div>
            <div class="set-name">${s.name}</div>
          </div>
        </div>`).join('')
    }</div>`;

    content.querySelectorAll('.set-card').forEach(card=>{
      const pdf = card.dataset.pdf;
      if(pdf) card.onclick = () => { location.hash = `#/view/${encodeURIComponent(folderEncoded)}/${encodeURIComponent(pdf)}`; };
    });
  }catch(e){
    errorState("Couldn't load this theme. Check your connection and try again.");
  }
}

function renderViewer(folderEncoded, pdfUrlEncoded){
  const pdfUrl = decodeURIComponent(pdfUrlEncoded);
  const folderName = decodeURIComponent(folderEncoded);
  crumb.style.display = 'flex';
  crumbLabel.textContent = 'Instructions';
  document.getElementById('backBtn').textContent = '\u2190 ' + folderName;

  // Google Docs Viewer renders the PDF inline without forcing a download.
  const viewerSrc = `https://docs.google.com/viewer?embedded=true&url=${encodeURIComponent(pdfUrl)}`;

  content.innerHTML = `
    <div class="pdf-viewer-wrap">
      <iframe src="${viewerSrc}" title="Instructions"></iframe>
      <div class="pdf-fallback"><a href="${pdfUrl}" target="_blank" rel="noopener">Open original PDF instead</a></div>
    </div>`;
}

function route(){
  const hash = location.hash;
  if(hash.startsWith('#/view/')){
    const parts = hash.slice('#/view/'.length).split('/');
    renderViewer(parts[0], parts.slice(1).join('/'));
  } else if(hash.startsWith('#/')){
    document.getElementById('backBtn').textContent = '\u2190 Themes';
    renderCategory(hash.slice(2));
  } else {
    renderHome();
  }
}
window.addEventListener('hashchange', route);
route();
</script>
</body>
</html>
